[tool.poetry]
name = "Bluebird"
version = "1.0.0"
description = "Bluebird is a Twitter username-watching service notifies the user via Discord."
authors = ["EthanC"]
license = "MIT"

[tool.poetry.dependencies]
python = "^3.8"
coloredlogs = "^10.0"
python-twitter = "^3.5"
httpx = "^0.11.1"

[tool.poetry.dev-dependencies]
pylint = "^2.4.4"
black = "^19.10b0"

[build-system]
requires = ["poetry>=0.12"]
build-backend = "poetry.masonry.api"
